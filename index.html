<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Path of the Apothecary - ตรวจสอบสถานะการสมัคร</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#3a1c71,#6a3093,#a044ff);
padding:30px;
overflow-x:hidden;
}

.container{
max-width:900px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:30px;
}

.logo{
width:140px;
margin-bottom:15px;
}

.title{
font-size:2.5rem;
font-weight:700;
color:white;
}

.subtitle{
color:rgba(255,255,255,.85);
margin-top:10px;
}

.search-card{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.2);
padding:25px;
border-radius:25px;
}

.search-box{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.search-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
outline:none;
}

.search-box button{
padding:15px 25px;
border:none;
border-radius:15px;
font-weight:700;
cursor:pointer;
background:white;
transition:.3s;
}

.search-box button:hover{
transform:translateY(-2px);
}

.result{
margin-top:25px;
}

.card{
background:white;
border-radius:25px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.team-name{
font-size:1.5rem;
font-weight:700;
color:#5b21b6;
margin-bottom:10px;
}

.info{
margin:10px 0;
font-size:1rem;
}

.status{
display:inline-block;
margin-top:15px;
padding:8px 16px;
border-radius:999px;
font-weight:600;
}

.confirmed{
background:#dcfce7;
color:#166534;
}

.pending{
background:#fef3c7;
color:#92400e;
}

.rejected{
background:#fee2e2;
color:#991b1b;
}

.message{
text-align:center;
color:white;
margin-top:20px;
font-size:1.1rem;
}

.footer{
text-align:center;
margin-top:40px;
color:rgba(255,255,255,.7);
font-size:.9rem;
}

@media(max-width:600px){

.title{
font-size:2rem;
}

.search-box{
flex-direction:column;
}

.search-box button{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="โลโก้.jpg" class="logo">

<div class="title">
⚗️ Path of the Apothecary
</div>

<div class="subtitle">
ระบบตรวจสอบสถานะการสมัคร
</div>

</div>

<div class="search-card">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="กรอกรหัสทีม เช่น P001">

<button onclick="searchData()">
ค้นหา
</button>

</div>

<div id="results" class="result"></div>

</div>

<div class="footer">
Path of the Apothecary © 2026
</div>

</div>

<script>

// เปลี่ยนตรงนี้เป็น Spreadsheet ID ของคุณ
const SHEET_ID = "YOUR_SPREADSHEET_ID";

const CSV_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

let teams = [];

function loadData(){

Papa.parse(CSV_URL,{

download:true,
header:true,

complete:function(result){

teams = result.data;

}

});

}

function searchData(){

const keyword =
document
.getElementById("searchInput")
.value
.trim()
.toUpperCase();

const results =
document.getElementById("results");

if(keyword === ""){

results.innerHTML =
"<div class='message'>กรุณากรอกรหัสทีม</div>";

return;

}

const filtered =
teams.filter(team =>

(team["รหัสทีม"] || "")
.toUpperCase()
=== keyword

);

if(filtered.length === 0){

results.innerHTML = `
<div class="message">
❌ ไม่พบข้อมูลรหัสทีมนี้
</div>
`;

return;

}

const team = filtered[0];

let badge = "pending";

if(team["สถานะ"] === "ยืนยันแล้ว"){
badge = "confirmed";
}

if(team["สถานะ"] === "ไม่ผ่าน"){
badge = "rejected";
}

results.innerHTML = `

<div class="card">

<div class="team-name">
${team["ชื่อทีม"]}
</div>

<div class="info">
<b>รหัสทีม:</b> ${team["รหัสทีม"]}
</div>

<div class="info">
<b>สมาชิก:</b> ${team["สมาชิก"]}
</div>

<div class="status ${badge}">
${team["สถานะ"]}
</div>

</div>

`;

}

loadData();

// รีเฟรชข้อมูลทุก 30 วินาที
setInterval(loadData,30000);

</script>

</body>
</html>
