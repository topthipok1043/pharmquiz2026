<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Path of the Apothecary</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(
135deg,
#3a1c71,
#6a3093,
#a044ff
);
overflow-x:hidden;
padding:30px;
}

body::before{
content:"";
position:fixed;
width:600px;
height:600px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-250px;
right:-150px;
filter:blur(80px);
}

body::after{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-200px;
left:-100px;
filter:blur(80px);
}

.container{
max-width:1100px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:35px;
}

.logo{
width:140px;
height:auto;
margin-bottom:15px;
}

.title{
font-size:2.8rem;
font-weight:700;
color:white;
}

.subtitle{
color:rgba(255,255,255,.85);
margin-top:10px;
}

.search-card{
backdrop-filter:blur(15px);
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);
padding:25px;
border-radius:24px;
margin-bottom:30px;
}

.search-box{
display:flex;
gap:12px;
flex-wrap:wrap;
}

input{
flex:1;
min-width:250px;
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
outline:none;
}

button{
padding:16px 24px;
border:none;
border-radius:16px;
font-weight:700;
cursor:pointer;
background:white;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:30px;
}

.stat{
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
color:white;
text-align:center;
}

.stat h3{
font-size:1.8rem;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:24px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.team-code{
font-size:.9rem;
color:#666;
margin-bottom:5px;
}

.team-name{
font-size:1.3rem;
font-weight:700;
margin-bottom:12px;
color:#5b21b6;
}

.member{
margin-bottom:8px;
}

.status{
display:inline-block;
padding:8px 14px;
border-radius:999px;
font-size:.85rem;
font-weight:600;
margin-top:10px;
}

.confirmed{
background:#dcfce7;
color:#166534;
}

.pending{
background:#fef3c7;
color:#92400e;
}

.rejected{
background:#fee2e2;
color:#991b1b;
}

.empty{
text-align:center;
color:white;
font-size:1.2rem;
margin-top:30px;
}

@media(max-width:600px){

.title{
font-size:2rem;
}

.search-box{
flex-direction:column;
}

button{
width:100%;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<img src="โลโก้.jpg" class="logo">

<div class="title">
⚗️ Path of the Apothecary
</div>

<div class="subtitle">
ระบบตรวจสอบข้อมูลผู้สมัคร
</div>

</div>

<div class="search-card">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="ค้นหารหัสทีม ชื่อทีม หรือชื่อสมาชิก">

<button onclick="searchTeam()">
ค้นหา
</button>

</div>

</div>

<div class="stats">

<div class="stat">
<h3 id="teamCount">0</h3>
<p>ทีมทั้งหมด</p>
</div>

<div class="stat">
<h3 id="confirmCount">0</h3>
<p>ยืนยันแล้ว</p>
</div>

</div>

<div id="results" class="results"></div>

<div id="empty" class="empty"></div>

</div>

<script>

const teams = [

{
code:"P001",
team:"The Alchemist",
members:[
"Anna",
"Beam",
"Film"
],
status:"ยืนยันแล้ว"
},

{
code:"P002",
team:"Potion Hunter",
members:[
"Mint",
"Palm",
"Gift"
],
status:"รอตรวจสอบ"
},

{
code:"P003",
team:"Herbal Masters",
members:[
"Nene",
"Ice",
"Toon"
],
status:"ยืนยันแล้ว"
}

];

function renderCards(data){

const results =
document.getElementById("results");

const empty =
document.getElementById("empty");

results.innerHTML = "";

if(data.length===0){

empty.innerHTML =
"❌ ไม่พบข้อมูล";

return;
}

empty.innerHTML = "";

data.forEach(team=>{

let badge="confirmed";

if(team.status==="รอตรวจสอบ")
badge="pending";

if(team.status==="ไม่ผ่าน")
badge="rejected";

results.innerHTML += `

<div class="card">

<div class="team-code">
${team.code}
</div>

<div class="team-name">
${team.team}
</div>

<div class="member">
👤 ${team.members.join(", ")}
</div>

<div class="status ${badge}">
${team.status}
</div>

</div>

`;

});

}

function searchTeam(){

const keyword =
document
.getElementById("searchInput")
.value
.toLowerCase();

const filtered =
teams.filter(team=>

team.code.toLowerCase().includes(keyword)

||

team.team.toLowerCase().includes(keyword)

||

team.members.join(" ")
.toLowerCase()
.includes(keyword)

);

renderCards(filtered);

}

document.getElementById("teamCount").innerText =
teams.length;

document.getElementById("confirmCount").innerText =
teams.filter(
t=>t.status==="ยืนยันแล้ว"
).length;

renderCards(teams);

</script>

</body>
</html>
